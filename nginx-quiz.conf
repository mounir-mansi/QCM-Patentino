# ============================================================
# nginx-quiz.conf — Config Nginx sécurisée pour QCM Patentino
# Copier dans : /etc/nginx/sites-available/quiz
# Puis : ln -s /etc/nginx/sites-available/quiz /etc/nginx/sites-enabled/quiz
#         nginx -t && systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name mandev.fr www.mandev.fr;

    # Certbot redirigera automatiquement vers HTTPS après : certbot --nginx
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mandev.fr www.mandev.fr;

    # Certificats SSL (gérés par Certbot — ne pas modifier manuellement)
    ssl_certificate     /etc/letsencrypt/live/mandev.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mandev.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Headers de sécurité ----
    server_tokens off;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # ---- Logs ----
    access_log /var/log/nginx/quiz-access.log;
    error_log  /var/log/nginx/quiz-error.log;

    # ---- Frontend Next.js (:3000) ----
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ---- Bloquer les scanners et chemins suspects ----
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|env|git|sql|bak|conf|log)$ {
        return 404;
    }
    location ~* /(wp-admin|wp-login|phpmyadmin|admin|setup|config|xmlrpc) {
        return 404;
    }
}
