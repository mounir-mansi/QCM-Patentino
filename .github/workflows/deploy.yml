name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync backend
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519 -p 2222 -o StrictHostKeyChecking=no" \
            --exclude='.env' --exclude='node_modules' \
            quiz-backend/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/QCM-Patentino/quiz-backend/

      - name: Sync frontend sources
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519 -p 2222 -o StrictHostKeyChecking=no" \
            --exclude='node_modules' --exclude='.next' \
            quiz-frontend/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/QCM-Patentino/quiz-frontend/

      - name: Build et restart sur le serveur
        run: |
          ssh -i ~/.ssh/id_ed25519 -p 2222 -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 -o ServerAliveCountMax=10 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "cd /var/www/QCM-Patentino/quiz-frontend && npm ci --legacy-peer-deps && npm run build && pm2 restart quiz-frontend && cd ../quiz-backend && npm ci && pm2 restart quiz-backend"
